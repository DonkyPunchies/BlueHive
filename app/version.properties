# BlueHive version ? single source of truth.
#
# versionCode: monotonic integer. MUST strictly increase for any release that
#   should propagate via the update server. The self-update client (#5) compares
#   latest_version_code > installed, and Android PackageInstaller rejects an
#   equal-or-lower versionCode on update ? so a build that forgets to bump this
#   simply cannot replace an existing install. The mistake surfaces immediately.
# versionName: human-readable, shown in release notes / the update manifest.
versionCode=15
versionName=1.0.13